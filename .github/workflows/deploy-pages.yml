name: Desplegar en GitHub Pages

# Publica el sitio estático (raíz del repositorio) en GitHub Pages.
# Requisito único: en Settings → Pages, seleccionar Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos necesarios para publicar en Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; no cancela el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto (todo el repositorio)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Desplegar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
