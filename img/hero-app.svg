<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" role="img" aria-label="Aplicación Kápital en un smartphone">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#00E0B8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7A6BF0"/>
      <stop offset="1" stop-color="#5A49D6"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0F0E1A" flood-opacity="0.25"/>
    </filter>
  </defs>

  <circle cx="300" cy="70" r="60" fill="url(#bg)" opacity="0.18"/>
  <circle cx="50" cy="380" r="80" fill="url(#bg)" opacity="0.14"/>

  <g filter="url(#sh)">
    <rect x="90" y="20" width="200" height="400" rx="34" fill="#0F0E1A"/>
    <rect x="99" y="29" width="182" height="382" rx="26" fill="#F5F4FF"/>
    <rect x="150" y="36" width="80" height="12" rx="6" fill="#0F0E1A"/>

    <!-- Balance card -->
    <rect x="112" y="66" width="156" height="96" rx="18" fill="url(#card)"/>
    <text x="128" y="96" font-family="Poppins, Arial, sans-serif" font-size="11" fill="#D9D3FF">Tu ahorro</text>
    <text x="128" y="124" font-family="Poppins, Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">1.248,50 €</text>
    <text x="128" y="146" font-family="Poppins, Arial, sans-serif" font-size="10" fill="#00E0B8">▲ +12,4% este mes</text>

    <!-- Chart -->
    <rect x="112" y="176" width="156" height="86" rx="16" fill="#fff" stroke="#EAE7FF"/>
    <polyline points="126,240 146,224 166,232 186,204 206,214 226,188 250,196"
      fill="none" stroke="#00C4A0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="250" cy="196" r="4" fill="#00C4A0"/>

    <!-- List rows -->
    <g font-family="Poppins, Arial, sans-serif">
      <rect x="112" y="276" width="156" height="40" rx="12" fill="#fff" stroke="#EAE7FF"/>
      <circle cx="132" cy="296" r="11" fill="#EDEAFF"/>
      <text x="150" y="293" font-size="10" font-weight="600" fill="#0F0E1A">Reto 30 días</text>
      <text x="150" y="306" font-size="8" fill="#8A86A8">+30,00 €</text>

      <rect x="112" y="324" width="156" height="40" rx="12" fill="#fff" stroke="#EAE7FF"/>
      <circle cx="132" cy="344" r="11" fill="#D8FBF3"/>
      <text x="150" y="341" font-size="10" font-weight="600" fill="#0F0E1A">Objetivo viaje</text>
      <text x="150" y="354" font-size="8" fill="#8A86A8">72% completado</text>
    </g>
  </g>
</svg>
